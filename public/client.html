<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mochila v2 - Step 5.5 Client</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #container {
      position: relative;
      width: 1024px;
      height: 768px;
      margin: 0 auto;
      border: 2px solid #333;
    }
    #canvas {
      display: block;
      width: 1024px;
      height: 768px;
      background: white;
      cursor: default;
    }
    #stats {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 4px;
      min-width: 300px;
      z-index: 1000;
    }
    #stats .label {
      color: #888;
      display: inline-block;
      width: 180px;
    }
    #stats .value {
      color: #0f0;
      font-weight: bold;
    }
    #stats .warn {
      color: #ff0;
    }
    #stats .error {
      color: #f00;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 10px;
      font-size: 12px;
      border-radius: 4px;
      z-index: 1000;
    }
    #controls input {
      width: 300px;
      padding: 4px;
      margin: 5px 0;
    }
    #controls button {
      padding: 6px 12px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
    }
    #log {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: #888;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      max-height: 150px;
      overflow-y: auto;
      border-radius: 4px;
      z-index: 1000;
      max-width: 600px;
    }
    #log .info { color: #0f0; }
    #log .warn { color: #ff0; }
    #log .error { color: #f00; }
  </style>
</head>
<body>
  <div id="container">
    <div id="controls">
      <div>
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://www.bbc.com)" value="https://www.bbc.com">
        <button onclick="connect()">Connect</button>
      </div>
      <div>
        <button onclick="testSite('https://www.bbc.com')">Test: BBC.com</button>
        <button onclick="testSite('https://en.wikipedia.org/wiki/Mac_OS_9')">Test: Wikipedia</button>
      </div>
    </div>

    <div id="stats">
      <div><span class="label">Status:</span> <span id="status" class="value">Disconnected</span></div>
      <div><span class="label">Current Frame ID:</span> <span id="frameId" class="value">-</span></div>
      <div><span class="label">Total Primitives:</span> <span id="totalPrimitives" class="value">0</span></div>
      <div><span class="label">This Frame (sent):</span> <span id="framePrimitives" class="value">0</span></div>
      <div><span class="label">Added:</span> <span id="added" class="value">0</span></div>
      <div><span class="label">Changed:</span> <span id="changed" class="value">0</span></div>
      <div><span class="label">Removed (executed):</span> <span id="removed" class="value">0</span></div>
      <div><span class="label">Last RTT:</span> <span id="rtt" class="value">-</span></div>
      <div><span class="label">Avg RTT:</span> <span id="avgRtt" class="value">-</span></div>
      <div><span class="label">Frames Received:</span> <span id="framesReceived" class="value">0</span></div>
      <div><span class="label">Acks Sent:</span> <span id="acksSent" class="value">0</span></div>
    </div>

    <canvas id="canvas" width="1024" height="768"></canvas>

    <div id="log"></div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let ws = null;
    let primitiveState = new Map(); // identity -> primitive
    let scrollY = 0;
    let frameCount = 0;
    let ackCount = 0;
    let lastRtt = 0;
    let frameReceiveTime = 0;
    let totalRemoved = 0;

    function log(message, level = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = level;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(message);
    }

    function updateStats() {
      document.getElementById('totalPrimitives').textContent = primitiveState.size;
      document.getElementById('framesReceived').textContent = frameCount;
      document.getElementById('acksSent').textContent = ackCount;
      if (lastRtt > 0) {
        document.getElementById('rtt').textContent = `${lastRtt}ms`;
      }
      document.getElementById('removed').textContent = totalRemoved;
    }

    function connect() {
      const url = document.getElementById('urlInput').value;
      if (!url) {
        alert('Please enter a URL');
        return;
      }

      if (ws) {
        ws.close();
      }

      document.getElementById('status').textContent = 'Connecting...';
      document.getElementById('status').className = 'warn';

      ws = new WebSocket('ws://localhost:8080');

      ws.onopen = () => {
        log('WebSocket connected', 'info');
        document.getElementById('status').textContent = 'Connected';
        document.getElementById('status').className = 'value';

        // Send init message
        ws.send(JSON.stringify({
          type: 'init',
          url: url,
        }));

        log(`Requesting page: ${url}`, 'info');
      };

      ws.onmessage = async (event) => {
        const data = event.data;

        if (typeof data === 'string') {
          // Stats response or other text message
          const message = JSON.parse(data);
          if (message.type === 'stats') {
            document.getElementById('avgRtt').textContent = `${message.stats.avgRoundTripMs.toFixed(1)}ms`;
          }
          return;
        }

        // FrameUpdate (binary data from server)
        frameReceiveTime = Date.now();

        // Convert Blob/ArrayBuffer to string, then parse JSON
        let jsonString;
        if (data instanceof Blob) {
          jsonString = await data.text();
        } else if (data instanceof ArrayBuffer) {
          const decoder = new TextDecoder('utf-8');
          jsonString = decoder.decode(data);
        } else {
          console.error('Unexpected data type:', typeof data);
          return;
        }

        const frameUpdate = JSON.parse(jsonString);
        processFrame(frameUpdate);
      };

      ws.onerror = (error) => {
        log('WebSocket error: ' + error, 'error');
        document.getElementById('status').textContent = 'Error';
        document.getElementById('status').className = 'error';
      };

      ws.onclose = () => {
        log('WebSocket closed', 'warn');
        document.getElementById('status').textContent = 'Disconnected';
        document.getElementById('status').className = 'warn';
      };
    }

    function testSite(url) {
      document.getElementById('urlInput').value = url;
      connect();
    }

    function processFrame(frameUpdate) {
      const frameId = frameUpdate.frameId;
      const primitives = frameUpdate.primitives;

      frameCount++;

      let addedCount = 0;
      let changedCount = 0;
      let removedCount = 0;

      // Process primitives
      for (const prim of primitives) {
        if (prim.type === 'RemovePrimitive') {
          // Execute removal
          if (primitiveState.has(prim.identity)) {
            primitiveState.delete(prim.identity);
            removedCount++;
            totalRemoved++;
          }
        } else {
          // Add or update
          const existed = primitiveState.has(prim.identity);
          primitiveState.set(prim.identity, prim);

          if (existed) {
            changedCount++;
          } else {
            addedCount++;
          }
        }
      }

      // Update UI
      document.getElementById('frameId').textContent = frameId;
      document.getElementById('framePrimitives').textContent = primitives.length;
      document.getElementById('added').textContent = addedCount;
      document.getElementById('changed').textContent = changedCount;
      document.getElementById('removed').textContent = removedCount;

      log(`Frame ${frameId}: ${primitives.length} primitives (+${addedCount} ~${changedCount} -${removedCount})`, 'info');

      // Render
      render();

      // Send ack
      const ackSendTime = Date.now();
      lastRtt = ackSendTime - frameReceiveTime;

      ws.send(JSON.stringify({
        type: 'ack',
        ack: {
          messageType: 'FrameAck',
          frameId: frameId,
        }
      }));

      ackCount++;
      updateStats();

      // Request stats
      ws.send(JSON.stringify({ type: 'stats' }));
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, 1024, 768);

      // Sort primitives by type (rects first, then text)
      const primitiveArray = Array.from(primitiveState.values());
      primitiveArray.sort((a, b) => {
        const order = { 'DrawRect': 1, 'DrawBorder': 2, 'DrawText': 3, 'DrawImage': 4 };
        return (order[a.type] || 99) - (order[b.type] || 99);
      });

      // DEBUG: Log first 15 text primitives being rendered (only once)
      if (!debugRendered && primitiveArray.length > 0) {
        const textPrims = primitiveArray.filter(p => p.type === 'DrawText').slice(0, 15);
        console.log('[CLIENT DEBUG] Rendering first 15 text primitives:');
        textPrims.forEach((p, idx) => {
          console.log(`  [${idx}] (${p.x},${p.y}) fontSize=${p.fontSize} maxWidth=${p.maxWidth || 'MISSING'} "${p.text.substring(0, 40)}"`);
        });
        debugRendered = true;
      }

      // Render primitives
      for (const prim of primitiveArray) {
        try {
          switch (prim.type) {
            case 'DrawRect':
              ctx.fillStyle = `rgba(${prim.color.r}, ${prim.color.g}, ${prim.color.b}, ${prim.color.a})`;
              ctx.fillRect(prim.x, prim.y, prim.width, prim.height);
              break;

            case 'DrawText':
              ctx.fillStyle = `rgba(${prim.color.r}, ${prim.color.g}, ${prim.color.b}, ${prim.color.a})`;
              ctx.font = `${prim.fontSize}px Arial`; // Use Arial as stand-in

              // If no maxWidth, text is pre-laid-out - just draw it
              if (!prim.maxWidth) {
                ctx.fillText(prim.text, prim.x, prim.y + prim.fontSize);
                break;
              }

              // Legacy: Wrap text based on maxWidth (for old primitives)
              const maxWidth = prim.maxWidth;
              if (maxWidth <= 0) break;

              const words = prim.text.split(' ');
              let line = '';
              let y = prim.y + prim.fontSize;

              for (let i = 0; i < words.length; i++) {
                const testLine = line + (line ? ' ' : '') + words[i];
                const metrics = ctx.measureText(testLine);

                if (metrics.width > maxWidth && line.length > 0) {
                  // Line too long - draw current line
                  ctx.fillText(line, prim.x, y);
                  line = words[i];
                  y += prim.fontSize * 1.2;

                  // Stop after reasonable number of lines
                  if (y > prim.y + prim.fontSize * 10) {
                    break;
                  }
                } else {
                  line = testLine;
                }
              }

              // Draw remaining text
              if (line.length > 0 && y <= prim.y + prim.fontSize * 10) {
                ctx.fillText(line, prim.x, y);
              }
              break;

            case 'DrawBorder':
              ctx.strokeStyle = `rgba(${prim.color.r}, ${prim.color.g}, ${prim.color.b}, ${prim.color.a})`;
              ctx.lineWidth = prim.thickness;
              ctx.strokeRect(prim.x, prim.y, prim.width, prim.height);
              break;

            case 'DrawImage':
              // Stub: draw placeholder rect
              ctx.fillStyle = '#ddd';
              ctx.fillRect(prim.x, prim.y, prim.width, prim.height);
              ctx.strokeStyle = '#999';
              ctx.strokeRect(prim.x, prim.y, prim.width, prim.height);
              ctx.fillStyle = '#666';
              ctx.font = '12px Arial';
              ctx.fillText('[Image]', prim.x + 5, prim.y + 20);
              break;
          }
        } catch (e) {
          console.error('Error rendering primitive:', e, prim);
        }
      }
    }

    // Scroll handling
    let debugRendered = false; // Only log once

    let scrollTimeout = null;
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();

      scrollY += e.deltaY;
      scrollY = Math.max(0, scrollY);

      // Debounce scroll events
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'scroll',
            scrollY: scrollY,
          }));
          log(`Scroll to ${scrollY}px`, 'info');
        }
      }, 50);
    });

    // Initial render
    render();
    updateStats();
  </script>
</body>
</html>
